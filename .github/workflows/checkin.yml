name: Auto Check-in

on:
  schedule:
    # 每天 UTC 0:00 执行 (北京时间 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Run YuChen check-in
        env:
          GITHUB_ACTIONS: true
          YUCHEN_ACCOUNTS: ${{ secrets.YUCHEN_ACCOUNTS }}
          PUSH_CONFIG: ${{ secrets.PUSH_CONFIG }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
        run: python -m checkin.yuchen

      - name: Run GlaDos check-in
        env:
          GITHUB_ACTIONS: true
          GLADOS_ACCOUNTS: ${{ secrets.GLADOS_ACCOUNTS }}
          PUSH_CONFIG: ${{ secrets.PUSH_CONFIG }}
        run: python -m checkin.glados

      - name: Run Airport check-in
        env:
          GITHUB_ACTIONS: true
          AIRPORT_ACCOUNTS: ${{ secrets.AIRPORT_ACCOUNTS }}
          PUSH_CONFIG: ${{ secrets.PUSH_CONFIG }}
        run: python -m checkin.airport

      - name: Run JavBus check-in
        env:
          GITHUB_ACTIONS: true
          JAVBUS_ACCOUNTS: ${{ secrets.JAVBUS_ACCOUNTS }}
          PUSH_CONFIG: ${{ secrets.PUSH_CONFIG }}
        run: python -m checkin.javbus